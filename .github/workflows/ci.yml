name: KACE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel older runs on the same branch/PR when new commits are pushed.
# Keeps CI queues clean and saves runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Stage 1: Syntax check ────────────────────────────────────────────────────
  lint:
    name: Lint (syntax check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check syntax of all Python files
        run: |
          echo "Checking Python syntax..."
          find . -name "*.py" \
            -not -path "./__pycache__/*" \
            -not -path "./.git/*" \
            | sort \
            | xargs python -m py_compile
          echo "All Python files passed syntax check."

  # ── Stage 2: Unit + regression tests ────────────────────────────────────────
  unit-tests:
    name: Unit & Regression Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite
        run: python3 tests/run_tests.py --verbose

  # ── Stage 3: YAML integrity ──────────────────────────────────────────────────
  yaml-integrity:
    name: YAML Integrity Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate boards.yaml schema and pattern precedence
        run: python3 tests/run_tests.py --yaml-check

  # ── Stage 4: Snapshot regression gate ───────────────────────────────────────
  # Explicitly blocks merge if any snapshot differs from the golden fixture.
  regression-tests:
    name: Snapshot Regression Gate
    runs-on: ubuntu-latest
    needs: [unit-tests, yaml-integrity]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run snapshot regression tests
        run: python3 tests/run_tests.py --verbose
        env:
          # Ensure snapshots are never auto-updated in CI
          KACE_UPDATE_SNAPSHOTS: "0"

  # ── Stage 5: Full Klipper sweep (main only) ──────────────────────────────────
  # Skipped on PRs to keep contributor iteration fast.
  # Runs automatically on every merge/push to main.
  # To run manually on a PR, use workflow_dispatch (future enhancement).
  full-klipper-sweep:
    name: Full Klipper Config Sweep (192+ configs)
    runs-on: ubuntu-latest
    needs: regression-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git for sparse checkout
        run: |
          git config --global user.email "ci@kace"
          git config --global user.name "KACE CI"

      - name: Run full Klipper config sweep
        run: python3 tests/run_tests.py --full-klipper-sweep --verbose
